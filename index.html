<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4×4 Rubik's Cube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

  <!-- Dot-matrix background texture -->
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-logo">
      <span class="logo-icon">⬛</span>
      <span class="logo-text">CUBE<span class="logo-accent">4</span></span>
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <span class="stat-label">MOVES</span>
        <span class="stat-value mono" id="move-counter">0</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">TIME</span>
        <span class="stat-value mono" id="timer-display">00:00</span>
      </div>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="main-layout">

    <!-- Cube Viewport -->
    <section class="cube-viewport" aria-label="3D Rubik's Cube">
      <div class="scene" id="scene">
        <div class="cube-container" id="cube-container">
          <!-- Cubies injected by JS -->
        </div>
      </div>
      <p class="drag-hint">Drag to rotate · Use controls below to twist layers</p>
    </section>

    <!-- Controls Panel -->
    <aside class="controls-panel">

      <!-- Primary actions -->
      <div class="control-group">
        <h2 class="group-label">Actions</h2>
        <div class="btn-grid">
          <button class="btn btn-primary" id="btn-shuffle" title="Shuffle cube (S)">
            <span class="btn-icon">🔀</span> Shuffle
          </button>
          <button class="btn btn-secondary" id="btn-reset" title="Reset to solved (R)">
            <span class="btn-icon">↩</span> Reset
          </button>
          <button class="btn btn-accent" id="btn-solve" title="Auto-solve (Ctrl+S)">
            <span class="btn-icon">✨</span> Solve
          </button>
          <button class="btn btn-timer" id="btn-timer" title="Start / Stop timer (T)">
            <span class="btn-icon">⏱</span> <span id="timer-btn-text">Start Timer</span>
          </button>
        </div>
      </div>

      <!-- Layer rotation controls -->
      <div class="control-group">
        <h2 class="group-label">Layer Rotations</h2>

        <!-- Axis tabs -->
        <div class="axis-tabs" role="tablist">
          <button class="axis-tab active" data-axis="x" role="tab" aria-selected="true">X Axis</button>
          <button class="axis-tab" data-axis="y" role="tab" aria-selected="false">Y Axis</button>
          <button class="axis-tab" data-axis="z" role="tab" aria-selected="false">Z Axis</button>
        </div>

        <!-- Layer buttons (0-3) -->
        <div class="layer-controls" id="layer-controls">
          <!-- Generated by JS based on selected axis -->
        </div>
      </div>

      <!-- Keyboard reference -->
      <div class="control-group">
        <h2 class="group-label">Keyboard Shortcuts</h2>
        <div class="key-grid">
          <div class="key-row"><kbd>S</kbd><span>Shuffle</span></div>
          <div class="key-row"><kbd>R</kbd><span>Reset</span></div>
          <div class="key-row"><kbd>T</kbd><span>Timer</span></div>
          <div class="key-row"><kbd>U</kbd><span>Undo last move</span></div>
          <div class="key-row"><kbd>1-4</kbd><span>Layer select</span></div>
          <div class="key-row"><kbd>[ ]</kbd><span>CW / CCW</span></div>
        </div>
      </div>

    </aside>
  </main>

  <!-- ===== WIN MODAL ===== -->
  <div class="modal-overlay" id="win-modal" role="dialog" aria-modal="true" aria-labelledby="win-title" hidden>
    <div class="modal">
      <div class="modal-confetti" id="confetti-container" aria-hidden="true"></div>
      <div class="modal-icon">🏆</div>
      <h2 class="modal-title" id="win-title">Cube Solved!</h2>
      <p class="modal-subtitle">Congratulations — you solved the 4×4!</p>
      <div class="modal-stats">
        <div class="modal-stat">
          <span class="modal-stat-label">Moves</span>
          <span class="modal-stat-value mono" id="win-moves">0</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">Time</span>
          <span class="modal-stat-value mono" id="win-time">00:00</span>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-play-again">Play Again</button>
        <button class="btn btn-secondary" id="btn-close-modal">Close</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
